backend:
  name: github
  repo: your-github-username/your-repo-name
  branch: main

publish_mode: editorial_workflow

media_folder: public/uploads
public_folder: /uploads

collections:
  - name: site
    label: Site Settings
    files:
      - file: content/site.json
        label: Site Copy
        name: site
        fields:
          - { label: Brand Name, name: brandName, widget: string }
          - { label: Owner Name, name: ownerName, widget: string }
          - { label: Tagline, name: tagline, widget: text }
          - { label: Intro, name: intro, widget: text }
          - { label: SEO Description, name: seoDescription, widget: text }
          - { label: Contact Email, name: contactEmail, widget: string }
          - { label: Booking URL, name: bookingUrl, widget: string, required: false }
          - { label: Portrait Image, name: portraitImage, widget: image, media_folder: public/uploads/photos, public_folder: /uploads/photos }
          - { label: Hero Image, name: heroImage, widget: image, media_folder: public/uploads/photos, public_folder: /uploads/photos }

  - name: teaching_videos
    label: Teaching Videos
    folder: content/cms/videos
    create: true
    format: json
    extension: json
    slug: "{{slug}}"
    media_folder: public/uploads/videos
    public_folder: /uploads/videos
    fields:
      - { label: Slug, name: slug, widget: string, hint: "Lowercase, no spaces, use hyphens." }
      - { label: Title, name: title, widget: string }
      - { label: Description, name: description, widget: text }
      - { label: Video File or URL, name: videoUrl, widget: file, required: false }
      - { label: External Video URL, name: externalVideoUrl, widget: string, required: false, hint: "Optional YouTube, Vimeo, or Cloudinary URL. If used, copy it into Video File or URL before publishing." }
      - { label: Thumbnail, name: thumbnailUrl, widget: image, required: false, media_folder: public/uploads/thumbnails, public_folder: /uploads/thumbnails }
      - { label: Date, name: date, widget: datetime, required: false, format: "YYYY-MM-DD", date_format: "YYYY-MM-DD", time_format: false }
      - { label: Category, name: category, widget: string, default: Teaching }
      - { label: Tags, name: tags, widget: list, required: false }
      - { label: Duration, name: duration, widget: string, required: false }
      - { label: Featured, name: featured, widget: boolean, default: false }
      - { label: Visibility, name: visibility, widget: select, options: ["public", "hidden"], default: public }

  - name: photography
    label: Photography
    folder: content/cms/photos
    create: true
    format: json
    extension: json
    slug: "{{slug}}"
    media_folder: public/uploads/photos
    public_folder: /uploads/photos
    fields:
      - { label: Slug, name: slug, widget: string, hint: "Lowercase, no spaces, use hyphens." }
      - { label: Title, name: title, widget: string }
      - { label: Description, name: description, widget: text }
      - { label: Image, name: image, widget: image }
      - { label: Alt Text, name: alt, widget: string }
      - { label: Location, name: location, widget: string, required: false }
      - { label: Year, name: year, widget: string, required: false }
      - { label: Category, name: category, widget: string, default: Portrait }
      - { label: Tags, name: tags, widget: list, required: false }
      - { label: Availability, name: availability, widget: select, options: ["For Sale", "Inquire", "Commission Only", "Not For Sale"], default: Inquire }
      - { label: Price, name: price, widget: string, required: false }
      - { label: Print Sizes, name: printSizes, widget: list, required: false }
      - { label: Purchase URL, name: purchaseUrl, widget: string, required: false }
      - { label: License Inquiry URL, name: licenseInquiryUrl, widget: string, required: false }
      - { label: Featured, name: featured, widget: boolean, default: false }
